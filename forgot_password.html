<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password - CreoVibe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
:root {
    --primary: #667eea;
    --accent: #764ba2;
    --bg: #F5F7FF;
}

body {
    margin: 0;
    font-family: Inter, Arial, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.forgot-container {
    width: 100%;
    max-width: 480px;
}

.back-btn {
    position: absolute;
    top: 30px;
    left: 30px;
    color: #667eea;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
}

.forgot-card {
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

.logo-area {
    text-align: center;
    margin-bottom: 30px;
}

.logo-circle {
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 28px;
    font-weight: bold;
}

.logo-text {
    font-family: "Monotype Corsiva", cursive;
    font-size: 32px;
    color: #667eea;
    margin-bottom: 10px;
}

.tagline {
    color: #666;
    font-size: 14px;
}

.instructions {
    background: #F5F7FF;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 30px;
    font-size: 14px;
    color: #555;
    line-height: 1.6;
}

.form-group {
    margin-bottom: 24px;
}

.form-label {
    display: block;
    margin-bottom: 8px;
    color: #333;
    font-weight: 500;
}

.form-control {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e1e4eb;
    border-radius: 10px;
    font-size: 16px;
    transition: 0.3s;
}

.form-control:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
}

.btn-secondary {
    width: 100%;
    padding: 16px;
    background: white;
    color: #667eea;
    border: 2px solid #667eea;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 15px;
}

.btn-secondary:hover {
    background: #F5F7FF;
}

#message {
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    display: none;
    text-align: center;
}

.success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}
</style>
</head>

<body>
<a href="login.html" class="back-btn">
    <i class="ri-arrow-left-line"></i> Back to Login
</a>

<div class="forgot-container">
    <div class="forgot-card">
        <div class="logo-area">
            <div class="logo-circle">
                <i class="ri-lock-line"></i>
            </div>
            <div class="logo-text">Reset Password</div>
            <div class="tagline">Enter your email to receive reset instructions</div>
        </div>

        <div class="instructions">
            <p><i class="ri-information-line"></i> We will send a password reset link to your registered email address. Click the link in the email to create a new password.</p>
        </div>

        <div id="message"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label class="form-label">Registered Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="artist@example.com" required>
            </div>
            
            <button type="submit" class="btn-primary">
                <i class="ri-mail-send-line"></i> Send Reset Link
            </button>
            
            <button type="button" class="btn-secondary" onclick="window.location.href='login.html'">
                <i class="ri-arrow-left-line"></i> Back to Login
            </button>
        </form>
    </div>
</div>

<script>
document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const messageDiv = document.getElementById('message');
    
    messageDiv.style.display = 'none';
    
    try {
        const response = await fetch('/api/forgot_password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        if (data.success) {
            messageDiv.className = 'success';
            messageDiv.innerHTML = `
                <i class="ri-checkbox-circle-line"></i> 
                <strong>Reset link sent!</strong><br>
                Check your email for password reset instructions.
            `;
            messageDiv.style.display = 'block';
            
            // Clear form
            document.getElementById('forgotForm').reset();
        } else {
            messageDiv.className = 'error';
            messageDiv.innerHTML = `<i class="ri-error-warning-line"></i> ${data.error || 'Error sending reset link'}`;
            messageDiv.style.display = 'block';
        }
    } catch (error) {
        messageDiv.className = 'error';
        messageDiv.innerHTML = `<i class="ri-error-warning-line"></i> Network error. Please try again.`;
        messageDiv.style.display = 'block';
    }
});
</script>
</body>
</html>
